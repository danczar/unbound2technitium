# Sample unbound.conf — exercises all features the migration script handles
# Typical setup: adblocking, split-horizon, DoT upstream, local zones,
# stub zones, auth zones, DNSSEC, ECS, rate limiting, DoH/DoQ

server:
    interface: 0.0.0.0
    interface: ::0
    port: 53

    # DNS-over-TLS service (server-side, serving DoT to LAN clients)
    tls-port: 853
    tls-service-key: "/etc/unbound/tls/server.key"
    tls-service-pem: "/etc/unbound/tls/server.pem"
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"
    tls-ciphers: "TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256"

    # DNS-over-HTTPS service
    https-port: 443
    http-endpoint: "/dns-query"

    # DNS-over-QUIC service
    quic-port: 853

    do-tcp: yes
    do-udp: yes
    do-ip4: yes
    do-ip6: yes
    prefer-ip6: no
    num-threads: 4

    # Privacy / hardening
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes
    qname-minimisation: yes
    qname-minimisation-strict: no
    aggressive-nsec: yes
    deny-any: yes
    rrset-roundrobin: yes
    minimal-responses: yes
    prefetch: yes

    # Serve expired / stale
    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-reply-ttl: 30
    serve-expired-client-timeout: 1800

    # Cache tuning
    cache-min-ttl: 300
    cache-max-ttl: 86400
    cache-max-negative-ttl: 900
    cache-min-negative-ttl: 0
    edns-buffer-size: 1232

    # DNSSEC validation
    module-config: "validator iterator"
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    domain-insecure: "home.lan"
    domain-insecure: "iot.lan"

    # EDNS Client Subnet
    send-client-subnet: 0.0.0.0/0
    send-client-subnet: ::/0
    client-subnet-zone: "cdn.example.com"
    max-client-subnet-ipv4: 24
    max-client-subnet-ipv6: 56

    # Rate limiting
    ratelimit: 1000
    ip-ratelimit: 100

    # Query logging
    log-queries: yes
    log-replies: yes

    # Access control
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 192.168.0.0/16 allow
    access-control: 172.16.0.0/12 allow
    access-control: ::1/128 allow
    access-control: fd00::/8 allow
    access-control: 0.0.0.0/0 refuse
    access-control: ::/0 refuse

    # Tag-based ACLs (exercises tag parsing)
    define-tag: "office iot guest"
    access-control-tag: 10.0.0.0/8 "office"
    access-control-view: 192.168.10.0/24 "vpn-clients"

    # ── Local zones: home network ──
    local-zone: "home.lan" static
    local-data: "nas.home.lan.      3600 IN A 192.168.1.10"
    local-data: "plex.home.lan.     3600 IN A 192.168.1.11"
    local-data: "proxmox.home.lan.  3600 IN A 192.168.1.2"
    local-data: "pihole.home.lan.   3600 IN A 192.168.1.3"
    local-data: "unifi.home.lan.    3600 IN A 192.168.1.1"
    local-data: "printer.home.lan.  3600 IN A 192.168.1.50"
    local-data: "k8s.home.lan.      3600 IN A 192.168.1.20"
    local-data: "mail.home.lan.     3600 IN MX 10 nas.home.lan."
    local-data: "home.lan.          3600 IN TXT \"v=spf1 -all\""
    local-data: "_sip._tcp.home.lan. 3600 IN SRV 10 60 5060 pbx.home.lan."
    local-data: "alias.home.lan.    3600 IN CNAME nas.home.lan."
    local-data: "home.lan.          3600 IN NS ns1.home.lan."
    local-data: "home.lan.          3600 IN CAA 0 issue \"letsencrypt.org\""
    local-data: "redirect.home.lan. 3600 IN DNAME services.home.lan."
    local-data: "home.lan.          3600 IN NAPTR 100 10 \"\" \"\" \"!^.*$!sip:info@home.lan!\" ."
    local-data: "admin.home.lan.    3600 IN RP admin.home.lan. txt.home.lan."

    # PTR records
    local-data-ptr: "192.168.1.10 nas.home.lan"
    local-data-ptr: "192.168.1.11 plex.home.lan"
    local-data-ptr: "192.168.1.2 proxmox.home.lan"

    # ── Local zones: IoT VLAN ──
    local-zone: "iot.lan" static
    local-data: "hue-bridge.iot.lan.  3600 IN A 10.10.10.5"
    local-data: "thermostat.iot.lan.  3600 IN A 10.10.10.6"
    local-data: "camera-front.iot.lan. 3600 IN A 10.10.10.20"
    local-data: "camera-back.iot.lan.  3600 IN A 10.10.10.21"

    # ── Reverse zone ──
    local-zone: "168.192.in-addr.arpa." static

    # ── Adblocking: deny zones ──
    local-zone: "doubleclick.net" deny
    local-zone: "googlesyndication.com" deny
    local-zone: "googleadservices.com" deny
    local-zone: "facebook-tracking.example.com" always_nxdomain
    local-zone: "ads.spyware.example.com" always_refuse

    # Private domains (don't forward upstream)
    private-domain: "home.lan"
    private-domain: "iot.lan"
    private-domain: "corp.internal"

    # Private addresses (rebind protection)
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16

    # Response IP overrides
    response-ip: 1.2.3.4/32 always_nxdomain
    response-ip-data: 5.6.7.8/32 "CNAME sinkhole.example.com."

    # DNS64
    dns64-prefix: 64:ff9b::/96

# ── RPZ-based adblocking (full config) ──
rpz:
    name: "rpz.oisd.nl"
    url: "https://big.oisd.nl/rpz"
    rpz-action-override: "nxdomain"
    rpz-log: yes
    rpz-log-name: "oisd-rpz"

rpz:
    name: "rpz.local"
    zonefile: "/etc/unbound/rpz/local-block.rpz"
    rpz-action-override: "nxdomain"

# ── Split-horizon views ──
view:
    name: "internal"
    view-first: yes
    local-zone: "myapp.example.com" static
    local-data: "myapp.example.com. 300 IN A 192.168.1.100"
    local-data: "api.myapp.example.com. 300 IN A 192.168.1.101"
    local-data-ptr: "192.168.1.100 myapp.example.com"
    response-ip: 10.0.0.0/8 redirect
    response-ip-data: 10.0.0.0/8 "A 192.168.1.100"

view:
    name: "vpn-clients"
    view-first: yes
    local-zone: "myapp.example.com" static
    local-data: "myapp.example.com. 300 IN A 10.8.0.100"
    local-data: "api.myapp.example.com. 300 IN A 10.8.0.101"

# ── Upstream forwarders: DNS-over-TLS ──
forward-zone:
    name: "."
    forward-tls-upstream: yes
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net

# ── Conditional forwarders ──
forward-zone:
    name: "corp.internal"
    forward-addr: 10.0.0.53
    forward-addr: 10.0.0.54

forward-zone:
    name: "dev.internal"
    forward-addr: 10.0.1.53
    forward-tls-upstream: yes
    forward-no-cache: yes

# ── TCP-only conditional forwarder ──
forward-zone:
    name: "legacy.internal"
    forward-addr: 10.0.2.53
    forward-tcp-upstream: yes

# ── Stub zones ──
stub-zone:
    name: "k8s.cluster.local"
    stub-addr: 10.96.0.10
    stub-addr: 10.96.0.11
    stub-first: yes

stub-zone:
    name: "consul.service"
    stub-addr: 10.0.0.100@8600
    stub-tls-upstream: yes

# ── Auth zones (secondary) ──
auth-zone:
    name: "example.org"
    primary: 198.51.100.1
    primary: 198.51.100.2
    allow-notify: 198.51.100.1
    fallback-enabled: yes

auth-zone:
    name: "archive.example.com"
    zonefile: "/etc/unbound/zones/archive.example.com.zone"
    for-downstream: yes
    for-upstream: yes
